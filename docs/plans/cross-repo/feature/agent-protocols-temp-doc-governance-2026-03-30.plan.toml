title = "Agent Protocols temp doc governance"
root_dir = "../../../.."
branch = "feature/agent-protocols/temp-doc-governance-2026-03-30"
completion_ledger = "docs/plans/cross-repo/feature/agent-protocols-temp-doc-governance-2026-03-30-completion.md"
phase_order = ["package_policy", "consumer_refresh", "acceptance"]

[phases.package_policy]
summary = "Add canonical temp-doc and naming guidance to the package."

[[phases.package_policy.checks]]
id = "temp-doc-protocol-exists"
type = "path_exists"
path = "temp-doc-protocol.md"

[[phases.package_policy.checks]]
id = "docs-temp-readme-exists"
type = "path_exists"
path = "docs/temp/README.md"

[[phases.package_policy.checks]]
id = "installer-scaffolds-temp-docs"
type = "text_present"
path = "scripts/install.py"
text = "docs/temp/README.md"

[[phases.package_policy.checks]]
id = "substantive-protocol-namespaced-branch-guidance"
type = "text_present"
path = "substantive-work-protocol.md"
text = "feature/<feature-slug>/<slice>-YYYY-MM-DD"

[phases.consumer_refresh]
summary = "Refresh the package into ironclaw-core and ironclaw-leam via the installer."
depends_on = ["package_policy"]

[[phases.consumer_refresh.checks]]
id = "core-temp-doc-readme"
type = "path_exists"
path = "/home/ismael/Github/.worktrees/ironclaw-core-agent-protocols-temp-doc-governance/docs/temp/README.md"

[[phases.consumer_refresh.checks]]
id = "core-vendored-protocol"
type = "path_exists"
path = "/home/ismael/Github/.worktrees/ironclaw-core-agent-protocols-temp-doc-governance/agent-protocols/temp-doc-protocol.md"

[[phases.consumer_refresh.checks]]
id = "core-no-example-plan-pollution"
type = "path_absent"
path = "/home/ismael/Github/.worktrees/ironclaw-core-agent-protocols-temp-doc-governance/docs/plans/feature/example-workstream.md"

[[phases.consumer_refresh.checks]]
id = "leam-temp-doc-readme"
type = "path_exists"
path = "/home/ismael/Github/.worktrees/ironclaw-leam-agent-protocols-temp-doc-governance/docs/temp/README.md"

[[phases.consumer_refresh.checks]]
id = "leam-vendored-protocol"
type = "path_exists"
path = "/home/ismael/Github/.worktrees/ironclaw-leam-agent-protocols-temp-doc-governance/agent-protocols/temp-doc-protocol.md"

[[phases.consumer_refresh.checks]]
id = "leam-no-example-plan-pollution"
type = "path_absent"
path = "/home/ismael/Github/.worktrees/ironclaw-leam-agent-protocols-temp-doc-governance/docs/plans/feature/example-workstream.md"

[phases.acceptance]
summary = "Validate the package and refreshed consumer installs."
depends_on = ["consumer_refresh"]

[[phases.acceptance.checks]]
id = "package-scripts-compile"
type = "command"
command = "python3 -m py_compile scripts/check_gated_plan.py scripts/workstream.py scripts/install.py"

[[phases.acceptance.checks]]
id = "example-manifest-acceptance"
type = "command"
command = "python3 scripts/check_gated_plan.py docs/plans/feature/example-workstream.plan.toml --phase acceptance"

[[phases.acceptance.checks]]
id = "core-vendored-scripts-compile"
type = "command"
command = "python3 -m py_compile /home/ismael/Github/.worktrees/ironclaw-core-agent-protocols-temp-doc-governance/agent-protocols/scripts/check_gated_plan.py /home/ismael/Github/.worktrees/ironclaw-core-agent-protocols-temp-doc-governance/agent-protocols/scripts/workstream.py /home/ismael/Github/.worktrees/ironclaw-core-agent-protocols-temp-doc-governance/agent-protocols/scripts/install.py"

[[phases.acceptance.checks]]
id = "leam-vendored-scripts-compile"
type = "command"
command = "python3 -m py_compile /home/ismael/Github/.worktrees/ironclaw-leam-agent-protocols-temp-doc-governance/agent-protocols/scripts/check_gated_plan.py /home/ismael/Github/.worktrees/ironclaw-leam-agent-protocols-temp-doc-governance/agent-protocols/scripts/workstream.py /home/ismael/Github/.worktrees/ironclaw-leam-agent-protocols-temp-doc-governance/agent-protocols/scripts/install.py"
