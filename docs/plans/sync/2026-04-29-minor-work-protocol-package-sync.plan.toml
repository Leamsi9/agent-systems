title = "Minor work protocol package sync"
branch = "chore/minor-work-protocol-package-sync-2026-04-29"
root_dir = "../../.."
completion_ledger = "docs/plans/sync/2026-04-29-minor-work-protocol-package-sync-completion.md"
phase_order = ["package_validation", "consumer_refresh"]

[phases.package_validation]
summary = "Validate the package-side minor-work protocol sync before promoting it."

[[phases.package_validation.checks]]
id = "package-main-or-work-branch"
type = "command"
command = "git branch --show-current | rg -x 'main|chore/minor-work-protocol-package-sync-2026-04-29'"

[[phases.package_validation.checks]]
id = "plan-exists"
type = "path_exists"
path = "docs/plans/sync/2026-04-29-minor-work-protocol-package-sync.md"

[[phases.package_validation.checks]]
id = "manifest-exists"
type = "path_exists"
path = "docs/plans/sync/2026-04-29-minor-work-protocol-package-sync.plan.toml"

[[phases.package_validation.checks]]
id = "completion-log-exists"
type = "path_exists"
path = "docs/plans/sync/2026-04-29-minor-work-protocol-package-sync-completion.md"

[[phases.package_validation.checks]]
id = "version-bumped"
type = "command"
command = "grep -Fx 0.0.4 VERSION && rg -F 'Experimental package version: `0.0.4`' README.md"

[[phases.package_validation.checks]]
id = "minor-protocol-present"
type = "path_exists"
path = "minor-work-protocol.md"

[[phases.package_validation.checks]]
id = "substantive-links-minor"
type = "text_present"
path = "substantive-work-protocol.md"
text = "[Minor work protocol](minor-work-protocol.md)"

[[phases.package_validation.checks]]
id = "installer-vendors-minor"
type = "text_present"
path = "scripts/install.py"
text = "\"minor-work-protocol.md\""

[[phases.package_validation.checks]]
id = "scripts-compile"
type = "command"
command = "python3 -m py_compile scripts/check_gated_plan.py scripts/workstream.py scripts/install.py"

[[phases.package_validation.checks]]
id = "completion-records-package-validation"
type = "text_present"
path = "docs/plans/sync/2026-04-29-minor-work-protocol-package-sync-completion.md"
text = "Package validation completed."

[phases.consumer_refresh]
summary = "Verify the ironclaw-core vendored package was refreshed from the package source."
depends_on = ["package_validation"]

[[phases.consumer_refresh.checks]]
id = "core-vendor-matches-package"
type = "command"
command = "for p in README.md VERSION SYNCING.md assistant-integration.md assistant-adoption-prompt.md substantive-work-protocol.md minor-work-protocol.md proposal-protocol.md plan-protocol.md temp-doc-protocol.md scripts/check_gated_plan.py scripts/install.py scripts/workstream.py examples/gated-phase-manifest.example.toml; do cmp -s \"$p\" \"/home/ismael/Github/ironclaw-core/agent-protocols/$p\" || { echo \"diff $p\"; exit 1; }; done"

[[phases.consumer_refresh.checks]]
id = "core-main-at-vendor-refresh"
type = "command"
command = "git -C /home/ismael/Github/ironclaw-core rev-parse --short HEAD | grep -Fx 62193160"

[[phases.consumer_refresh.checks]]
id = "core-vendor-clean"
type = "command"
command = "test -z \"$(git -C /home/ismael/Github/ironclaw-core status --short -- agent-protocols)\""

[[phases.consumer_refresh.checks]]
id = "completion-records-consumer-refresh"
type = "text_present"
path = "docs/plans/sync/2026-04-29-minor-work-protocol-package-sync-completion.md"
text = "Consumer refresh completed."
